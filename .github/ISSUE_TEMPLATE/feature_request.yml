name: Feature request
description: Propose a product, SDK, tool, or workflow improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, command, SDK API, or plugin shape.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - SDK/runtime
        - market data
        - broker safety
        - plugins
        - npm/install
        - docs
        - other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
