name: test

on:
  push:
    branches: [main, "ci/**"]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        # Match the dependency set the suite is known green under: core + cn
        # (akshare) + dev (pytest, pytest-asyncio). Optional features without
        # their extra installed (ccxt/duckdb/mplfinance/…) skip gracefully.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cn,dev]"

      - name: Test
        run: pytest --ignore=tests/e2e -q
