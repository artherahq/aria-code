name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 4.1.1)"
        required: false

jobs:
  verify-version:
    name: Verify version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pyproject / package.json / aria_cli.py must agree with the tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            python scripts/bump_version.py --check "${{ github.ref_name }}"
          else
            python scripts/bump_version.py --check ${{ github.event.inputs.version }}
          fi

  publish-npm:
    name: Publish to npmjs.com
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Publish @artheras/aria-code to npm
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # enables PyPI Trusted Publishing (OIDC) as an alternative
    env:
      # Graceful skip if the token secret isn't configured yet (referencing a
      # secret in env is allowed; referencing one in a job-level `if` is not).
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        if: env.HAS_PYPI_TOKEN == 'true'
        run: uv build

      - name: Check distribution metadata
        if: env.HAS_PYPI_TOKEN == 'true'
        run: uvx twine check dist/*

      - name: Publish to PyPI
        if: env.HAS_PYPI_TOKEN == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Skipped notice
        if: env.HAS_PYPI_TOKEN != 'true'
        run: echo "PYPI_API_TOKEN secret not set — skipping PyPI publish. Add it in repo Settings → Secrets, or configure PyPI Trusted Publishing."

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com/"
          scope: "@artherahq"

      - name: Prepare scoped package for GitHub Packages
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@artherahq/aria-code';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com/', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
        working-directory: npm

      - name: Publish @artherahq/aria-code to GitHub Packages
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
