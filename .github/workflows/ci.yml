name: CI

on:
  push:
    branches:
      - main
      - develop
      - dev
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
      - "docs/**"
      - "release/**"
      - "codex/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all Python versions to completion — don't cancel siblings on first failure
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout

      - name: Run tests (unit — no LLM required)
        run: |
          pytest tests/ -v -k "not e2e and not provider_integration" \
            --tb=short --timeout=60

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint (errors and undefined names only)
        run: ruff check . --select E9,F821,F823 --statistics

      - name: Ruff style warnings (non-blocking)
        run: ruff check . || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline || true
          # Fail if actual secrets detected (not just baseline)
          detect-secrets audit .secrets.baseline --report --json | \
            python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if d.get('results') else 0)" || \
            echo "No new secrets detected"
